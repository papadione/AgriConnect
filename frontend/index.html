<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>AgriConnect Sénégal — Connexion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="bg-layer">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="grain"></div>
  </div>

  <aside class="hero-panel">
    <div class="hero-content">
      <div class="logo-mark">
        <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="30" cy="30" r="28" stroke="#F5E6C8" stroke-width="2"/>
          <path d="M30 44 C30 44 14 34 14 22 C14 14 22 10 30 16 C38 10 46 14 46 22 C46 34 30 44 30 44Z" fill="#7AB648" opacity="0.9"/>
          <path d="M30 16 L30 44" stroke="#F5E6C8" stroke-width="1.5" stroke-dasharray="2 3"/>
          <circle cx="30" cy="16" r="2" fill="#F5E6C8"/>
        </svg>
      </div>
      <h1 class="brand-title">Agri<span>Connect</span></h1>
      <p class="brand-tagline">Le marché agricole du Sénégal<br>de demain, aujourd'hui</p>

      <div class="stats-row">
        <div class="stat">
          <span class="stat-num">2 400+</span>
          <span class="stat-label">Agriculteurs</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span class="stat-num">180+</span>
          <span class="stat-label">Produits</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span class="stat-num">14</span>
          <span class="stat-label">Régions</span>
        </div>
      </div>

      <div class="hero-illustration">
        <svg viewBox="0 0 320 180" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="260" cy="40" r="22" fill="#F5C842" opacity="0.25"/>
          <circle cx="260" cy="40" r="14" fill="#F5C842" opacity="0.5"/>
          <ellipse cx="160" cy="160" rx="200" ry="60" fill="#4A7C20" opacity="0.3"/>
          <ellipse cx="80" cy="170" rx="130" ry="50" fill="#3D6B18" opacity="0.4"/>
          <rect x="55" y="110" width="6" height="30" rx="3" fill="#5A3A1A"/>
          <ellipse cx="58" cy="105" rx="18" ry="22" fill="#7AB648" opacity="0.85"/>
          <rect x="100" y="120" width="5" height="22" rx="2.5" fill="#5A3A1A"/>
          <ellipse cx="103" cy="116" rx="14" ry="17" fill="#8CC554" opacity="0.85"/>
          <rect x="130" y="130" width="80" height="35" rx="4" fill="#C8A84B" opacity="0.4"/>
          <line x1="135" y1="135" x2="205" y2="135" stroke="#C8A84B" stroke-width="1" opacity="0.6"/>
          <line x1="135" y1="142" x2="205" y2="142" stroke="#C8A84B" stroke-width="1" opacity="0.6"/>
          <line x1="135" y1="149" x2="205" y2="149" stroke="#C8A84B" stroke-width="1" opacity="0.6"/>
          <line x1="135" y1="156" x2="205" y2="156" stroke="#C8A84B" stroke-width="1" opacity="0.6"/>
          <rect x="230" y="125" width="28" height="22" rx="4" fill="#8B4513" opacity="0.7"/>
          <ellipse cx="244" cy="125" rx="14" ry="5" fill="#A0522D" opacity="0.8"/>
          <circle cx="238" cy="121" r="5" fill="#E74C3C" opacity="0.85"/>
          <circle cx="244" cy="119" r="5" fill="#F39C12" opacity="0.85"/>
          <circle cx="250" cy="121" r="5" fill="#E74C3C" opacity="0.85"/>
          <path d="M140 165 Q160 155 180 165 Q200 175 220 165" stroke="#D4A85C" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
        </svg>
      </div>
    </div>
  </aside>

  <main class="form-panel">
    <div class="form-card">

      <div class="form-header">
        <h2>Bon retour</h2>
        <p>Connectez-vous pour accéder au marché sénégalais</p>
      </div>

      <div class="tabs">
        <button class="tab active" data-tab="login">Connexion</button>
        <button class="tab" data-tab="register">Inscription</button>
      </div>

      <!-- Formulaire Connexion -->
      <form id="loginForm" class="auth-form active">
        <div class="field-group">
          <label for="loginPhone">Téléphone</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
            <input type="tel" id="loginPhone" placeholder="77 123 45 67" autocomplete="off"/>
          </div>
          <small>Exemple : 77 123 45 67</small>
        </div>

        <div class="field-group">
          <label for="loginPassword">Mot de passe</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password"/>
            <button type="button" class="toggle-pwd" aria-label="Afficher mot de passe">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <a href="#" class="forgot-link">Mot de passe oublié ?</a>
        </div>

        <div class="remember-row">
          <label class="checkbox-label">
            <input type="checkbox" id="remember"/>
            <span class="checkmark"></span>
            Se souvenir de moi
          </label>
        </div>

        <button type="submit" class="btn-primary">
          <span>Se connecter</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>

        <div class="divider"><span>ou continuer avec</span></div>

        <div class="social-btns">
          <button type="button" class="btn-social">
            <svg viewBox="0 0 24 24" width="18" height="18"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Google
          </button>
          <button type="button" class="btn-social">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            Facebook
          </button>
        </div>
      </form>

      <!-- Formulaire Inscription -->
      <form id="registerForm" class="auth-form">
        <div class="fields-row">
          <div class="field-group">
            <label>Prénom</label>
            <div class="input-wrap">
              <input type="text" id="regFirstName" placeholder="Mamadou"/>
            </div>
          </div>
          <div class="field-group">
            <label>Nom</label>
            <div class="input-wrap">
              <input type="text" id="regLastName" placeholder="Diallo"/>
            </div>
          </div>
        </div>

        <div class="field-group">
          <label>Type de compte</label>
          <div class="role-selector">
            <label class="role-option">
              <input type="radio" name="role" value="acheteur" checked/>
              <div class="role-card">
                <span class="role-icon">🛒</span>
                <span>Acheteur</span>
              </div>
            </label>
            <label class="role-option">
              <input type="radio" name="role" value="agriculteur"/>
              <div class="role-card">
                <span class="role-icon">🌾</span>
                <span>Agriculteur</span>
              </div>
            </label>
            <label class="role-option">
              <input type="radio" name="role" value="grossiste"/>
              <div class="role-card">
                <span class="role-icon">🏪</span>
                <span>Grossiste</span>
              </div>
            </label>
          </div>
        </div>

        <div class="field-group">
          <label>Téléphone</label>
          <div class="input-wrap phone-wrap">
            <span class="phone-prefix">+221</span>
            <input type="tel" id="regPhone" placeholder="77 000 00 00"/>
          </div>
          <small>Numéro Orange, Kirene, Tigo, Expresso ou Promobile </small>
        </div>

        <div class="field-group">
          <label>Région</label>
          <div class="input-wrap">
            <select id="regRegion" style="width:100%; padding:12px 16px; border:1.5px solid var(--border); border-radius:8px; background:var(--cream); font-family:inherit;">
              <option value="">Sélectionnez votre région</option>
              <option value="Dakar">Dakar</option>
              <option value="Thiès">Thiès</option>
              <option value="Saint-Louis">Saint-Louis</option>
              <option value="Diourbel">Diourbel</option>
              <option value="Fatick">Fatick</option>
              <option value="Kaffrine">Kaffrine</option>
              <option value="Kaolack">Kaolack</option>
              <option value="Kédougou">Kédougou</option>
              <option value="Kolda">Kolda</option>
              <option value="Louga">Louga</option>
              <option value="Matam">Matam</option>
              <option value="Sédhiou">Sédhiou</option>
              <option value="Tambacounda">Tambacounda</option>
              <option value="Ziguinchor">Ziguinchor</option>
            </select>
          </div>
        </div>

        <div class="field-group">
          <label>Mot de passe</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="regPassword" placeholder="Minimum 6 caractères"/>
          </div>
          <div class="pwd-strength">
            <div class="strength-bar"></div>
            <div class="strength-bar"></div>
            <div class="strength-bar"></div>
            <div class="strength-bar"></div>
          </div>
        </div>

        <div class="field-group terms-row">
          <label class="checkbox-label">
            <input type="checkbox" id="acceptTerms"/>
            <span class="checkmark"></span>
            J'accepte les <a href="#">conditions d'utilisation</a>
          </label>
        </div>

        <button type="submit" class="btn-primary">
          <span>Créer mon compte</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </form>

    </div>
  </main>

  <script src="js/auth.js"></script>
</body>
</html>
