<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>AgriConnect - Catalogue</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/catalogue.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="logo">AgriConnect 🌾</div>
                <nav class="side-nav">
                    <a href="#" class="active">🛒 Catalogue</a>
                    <a href="#">📦 Mes Commandes</a>
                </nav>
            </div>
            <div class="sidebar-bottom">
                <span id="user-name">Chargement...</span>
                <button onclick="logout()" class="btn-logout">Déconnexion</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <h2>Nos Produits Locaux</h2>
            </header>
            <div id="product-list" class="product-grid">
                </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/catalogue.js"></script>
    <script>
        if (!localStorage.getItem('token')) window.location.href = 'index.html';
        const user = JSON.parse(localStorage.getItem('user'));
        if (user) document.getElementById('user-name').innerText = user.name;
        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
