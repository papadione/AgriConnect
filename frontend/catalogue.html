<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AgriConnect Sénégal — Catalogue produits</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

  <header class="header-simple">
    <div class="header-container">
      <div class="logo">
        <div class="logo-mark">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" width="32" height="32">
            <circle cx="20" cy="20" r="18" stroke="#7AB648" stroke-width="1.5"/>
            <path d="M20 29 C20 29 10 23 10 15 C10 10 15 7 20 11 C25 7 30 10 30 15 C30 23 20 29 20 29Z" fill="#7AB648" opacity="0.9"/>
            <circle cx="20" cy="11" r="2" fill="#F5E6C8"/>
          </svg>
        </div>
        <h1>Agri<span>Connect</span></h1>
      </div>
      
      <div class="header-actions">
        <div class="user-info">
          <span id="userNameDisplay">Chargement...</span>
          <div class="user-avatar-small">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
        </div>
        <button class="btn-dashboard" id="dashboardBtn">Tableau de bord</button>
        <button class="btn-logout" id="logoutBtn">Déconnexion</button>
      </div>
    </div>
  </header>

  <div class="search-section">
    <div class="search-container">
      <input type="text" id="searchInput" placeholder="Rechercher un produit, un producteur..." class="search-input">
      <button class="btn-search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="filters-simple">
    <div class="filters-container">
      <select id="categoryFilter" class="filter-select">
        <option value="">Toutes les catégories</option>
        <option value="legumes">Légumes</option>
        <option value="fruits">Fruits</option>
        <option value="cereales">Céréales</option>
        <option value="tubercules">Tubercules</option>
        <option value="volaille">Volaille</option>
        <option value="laitiers">Produits laitiers</option>
        <option value="poissons">Poissons</option>
      </select>
      
      <select id="regionFilter" class="filter-select">
        <option value="">Toutes les régions</option>
        <option value="Dakar">Dakar</option>
        <option value="Thiès">Thiès</option>
        <option value="Saint-Louis">Saint-Louis</option>
        <option value="Diourbel">Diourbel</option>
        <option value="Fatick">Fatick</option>
        <option value="Kaffrine">Kaffrine</option>
        <option value="Kaolack">Kaolack</option>
        <option value="Kédougou">Kédougou</option>
        <option value="Kolda">Kolda</option>
        <option value="Louga">Louga</option>
        <option value="Matam">Matam</option>
        <option value="Sédhiou">Sédhiou</option>
        <option value="Tambacounda">Tambacounda</option>
        <option value="Ziguinchor">Ziguinchor</option>
      </select>
      
      <select id="sortFilter" class="filter-select">
        <option value="recent">Plus récents</option>
        <option value="price_asc">Prix croissant</option>
        <option value="price_desc">Prix décroissant</option>
      </select>
    </div>
  </div>

  <main class="catalogue-main">
    <div class="products-header">
      <h2>Produits agricoles du Sénégal</h2>
      <p>Directement des producteurs locaux</p>
    </div>
    
    <div class="products-grid" id="productsGrid">
      <div class="loading">
        <div class="spinner"></div>
        <p>Chargement des produits...</p>
      </div>
    </div>
  </main>

  <div class="cart-float" id="cartFloat">
    <button class="cart-btn-float" id="cartBtn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="9" cy="21" r="1"/>
        <circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
      <span class="cart-badge" id="cartCount">0</span>
    </button>
  </div>

  <div class="cart-modal" id="cartModal">
    <div class="cart-modal-content">
      <div class="cart-modal-header">
        <h3>Votre panier</h3>
        <button class="close-cart" id="closeCartModal">&times;</button>
      </div>
      <div class="cart-items" id="cartItems">
        <p class="empty-cart">Votre panier est vide</p>
      </div>
      <div class="cart-modal-footer">
        <div class="cart-total">
          <span>Total</span>
          <strong id="cartTotal">0 FCFA</strong>
        </div>
        <button class="btn-checkout" id="checkoutBtn">Passer la commande</button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/catalogue.js"></script>
</body>
</html>
